name: Sync GitHub Issues to Jira

on:
  workflow_dispatch:        # allows manual runs from Actions tab
  issues:
    types: [opened, closed, edited]   # automatic runs when issues change

jobs:
  sync-to-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Validate YAML syntax
        run: |
          echo "✅ Workflow syntax looks good!"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Issue title: ${{ github.event.issue.title }}"

      - name: Update Jira
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CONFLUENCE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"fields":{"summary":"${{ github.event.issue.title }}","description":"${{ github.event.issue.body }}"}}' \
            https://vijayakumar771.atlassian.net/rest/api/3/issue
